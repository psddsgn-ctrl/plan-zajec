<!DOCTYPE html> 
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan zajęć</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' rx='18' fill='%231a1f26'/%3E%3Cpath d='M10,20 V80 H90 V20 H70 V30 H60 V20 H40 V30 H30 V20 H10' fill='none' stroke='%23A12A7C' stroke-width='5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='22' fill='none' stroke='%23A12A7C' stroke-width='5'/%3E%3Cpath d='M50,23 L50,28 M68,30 L65,33 M77,50 L72,50 M68,70 L65,67 M50,77 L50,72 M32,70 L35,67 M23,50 L28,50 M32,30 L35,33' fill='none' stroke='%23A12A7C' stroke-width='5'/%3E%3Cpath d='M42,57 L42,43 L50,51 L58,43 L58,57' fill='none' stroke='%23A12A7C' stroke-width='4.5' stroke-linecap='round'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="12M2">
    <meta name="apple-mobile-web-app-title" content="12M2">
    <meta name="theme-color" content="#1a1f26">
    <meta name="msapplication-navbutton-color" content="#1a1f26">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">

    <style>
        :root {
            --bg: #1a1f26;
            --card-bg: #2c333a;
            --text: #e0e0e0;
            --primary: #4cc9f0;
            --accent: #3f37c9;
            --secondary: #8d99ae;
            --n-color: #f72585;
            --p-color: #4cc9f0;
            --shadow: 0 8px 30px rgba(0,0,0,0.3);
            --header-bg: #1a1f26;
            --active-glow: rgba(76, 201, 240, 0.25);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: all 0.3s ease;
            padding-bottom: 50px;
        }

        header {
            background: var(--header-bg);
            color: white;
            padding: 30px 15px;
            text-align: center;
            border-radius: 0 0 20px 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .app-logo {
            width: 100px;
            height: 100px;
        }

        /* Week info strip below header */
        .week-info {
            text-align: center;
            font-size: 0.78em;
            color: var(--secondary);
            padding: 6px 15px 0;
            letter-spacing: 0.03em;
        }

        .week-info span {
            color: var(--primary);
            font-weight: 600;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
            gap: 10px;
        }

        button {
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        .week-toggle {
            display: flex;
            background: var(--card-bg);
            padding: 5px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .week-opt {
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, color 0.2s;
        }

        .week-opt.active {
            background: var(--primary);
            color: white;
        }

        .tabs {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding: 10px;
            gap: 8px;
        }

        .tab {
            padding: 10px 18px;
            background: var(--card-bg);
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: var(--shadow);
            font-size: 0.9em;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, color 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        /* TODAY tab gets subtle indicator */
        .tab.today-tab {
            position: relative;
        }
        .tab.today-tab::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--primary);
        }
        .tab.today-tab.active::after {
            background: white;
        }

        .schedule-container { padding: 15px; max-width: 500px; margin: 0 auto; }

        .lesson-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
            border-left: 6px solid var(--primary);
            animation: fadeIn 0.4s ease forwards;
            transition: box-shadow 0.3s, background 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* Currently active lesson */
        .lesson-card.is-now {
            box-shadow: 0 0 0 2px var(--primary), var(--shadow);
            background: linear-gradient(135deg, #2c333a 0%, #1e3040 100%);
        }

        .lesson-card.is-now::before {
            content: '▶ TERAZ';
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.65em;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 0.08em;
            animation: pulse 2s infinite;
        }

        /* Past lesson - dimmed */
        .lesson-card.is-past {
            opacity: 0.45;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Progress bar for active lesson */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--primary);
            border-radius: 0 3px 3px 0;
            transition: width 30s linear;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .time-box {
            min-width: 85px;
            font-weight: 600;
            color: var(--primary);
            border-right: 1px solid var(--secondary);
            margin-right: 15px;
            font-size: 0.85em;
        }

        .info-box { flex-grow: 1; }
        .subject { font-weight: 600; font-size: 1.05em; margin-bottom: 4px; }
        .room { font-size: 0.85em; opacity: 0.7; }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            opacity: 0.5;
        }

        /* Current time indicator */
        .current-time-display {
            text-align: center;
            font-size: 0.85em;
            color: var(--secondary);
            padding: 2px 15px 8px;
        }
        .current-time-display b {
            color: var(--text);
        }
    </style>
</head>
<body>

<header>
    <svg class="app-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <clipPath id="centerM">
                <circle cx="50" cy="50" r="12" />
            </clipPath>
        </defs>
        <path d="M10,20 V80 H90 V20 H70 V30 H60 V20 H40 V30 H30 V20 H10" 
              fill="none" stroke="#A12A7C" stroke-width="5" stroke-linejoin="round"/>
        <circle cx="50" cy="50" r="22" fill="none" stroke="#A12A7C" stroke-width="5" />
        <path d="M50,23 L50,28 M68,30 L65,33 M77,50 L72,50 M68,70 L65,67 M50,77 L50,72 M32,70 L35,67 M23,50 L28,50 M32,30 L35,33" 
              fill="none" stroke="#A12A7C" stroke-width="5" />
        <path d="M42,57 L42,43 L50,51 L58,43 L58,57" 
              fill="none" stroke="#A12A7C" stroke-width="4.5" stroke-linecap="round"/>
    </svg>
    <h1 style="margin:0; font-size: 1.8em;">12M2</h1>
</header>

<div class="week-info" id="weekInfo"></div>
<div class="current-time-display" id="timeDisplay"></div>

<div class="controls">
    <div class="week-toggle">
        <div id="optN" class="week-opt" onclick="setWeek('N')">Niep. (N)</div>
        <div id="optP" class="week-opt" onclick="setWeek('P')">Parz. (P)</div>
    </div>
</div>

<div class="tabs" id="tabs">
    <div class="tab" onclick="changeDay(1)">Pon</div>
    <div class="tab" onclick="changeDay(2)">Wt</div>
    <div class="tab" onclick="changeDay(3)">Śr</div>
    <div class="tab" onclick="changeDay(4)">Czw</div>
    <div class="tab" onclick="changeDay(5)">Pt</div>
</div>

<div class="schedule-container" id="schedule"></div>

<script>
    const data = {
        1: [ // Poniedziałek
            { time: "09:15-10:45", name: "WprMES P03", room: "A631b", type: "P" },
            { time: "11:00-12:30", name: "ModMCAD P03", room: "B216", type: "N" },
            { time: "11:00-12:30", name: "ModMCAD P03", room: "B216", type: "P" },
            { time: "12:45-14:15", name: "PodEkspl L03", room: "J116", type: "N" },
            { time: "14:30-16:00", name: "PKMII L03", room: "B212", type: "N" }
        ],
        2: [ // Wtorek
            { time: "07:30-09:00", name: "Mechanpł Ć", room: "A638", type: "N" },
            { time: "07:30-09:00", name: "Mechanpł Ć", room: "A638", type: "P" },
            { time: "11:00-12:30", name: "PrPTech P03", room: "C206", type: "N" },
            { time: "12:45-14:15", name: "J. angielski", room: "A202", type: "O" },
            { time: "14:30-16:00", name: "PKMII P03", room: "A535", type: "N" },
            { time: "14:30-16:00", name: "PKMII P03", room: "A535", type: "P" },
            { time: "16:15-17:45", name: "MetrSGWy L03", room: "C01", type: "N" },
            { time: "16:15-17:45", name: "MetrSGWy L03", room: "C01", type: "P" }
        ],
        3: [], // Środa wolna
        4: [ // Czwartek
            { time: "11:00-12:30", name: "MTMechM L03", room: "B08", type: "N" },
        ],
        5: [ // Piątek
            { time: "11:00-12:30", name: "MetrSGWY P03", room: "C106", type: "P" },
            { time: "14:30-16:00", name: "MTMechM Ć", room: "A502", type: "N" },
        ]
    };

    // ── WEEK AUTO-DETECTION ──────────────────────────────────────────────────
    // Reference: week of 2025-05-19 is ODD (nieparzysty = N)
    // We use ISO week number parity relative to this reference.
    function getISOWeekNumber(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function detectWeek() {
        const today = new Date();
        const weekNum = getISOWeekNumber(today);
        // Odd ISO week number → N (nieparzysty), Even → P (parzysty)
        // Calibrated: week 21 of 2025 (May 19) is N → week 21 is odd ✓
        return (weekNum % 2 === 1) ? 'N' : 'P';
    }

    // ── TIME HELPERS ─────────────────────────────────────────────────────────
    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function parseLesson(lesson) {
        const [startStr, endStr] = lesson.time.split('-');
        return {
            startMin: timeToMinutes(startStr),
            endMin: timeToMinutes(endStr)
        };
    }

    function getNowMinutes() {
        const now = new Date();
        return now.getHours() * 60 + now.getMinutes();
    }

    function getLessonStatus(lesson) {
        const { startMin, endMin } = parseLesson(lesson);
        const nowMin = getNowMinutes();
        if (nowMin >= startMin && nowMin < endMin) return 'now';
        if (nowMin >= endMin) return 'past';
        return 'future';
    }

    function getProgressPercent(lesson) {
        const { startMin, endMin } = parseLesson(lesson);
        const nowMin = getNowMinutes();
        const total = endMin - startMin;
        const elapsed = nowMin - startMin;
        return Math.min(100, Math.max(0, (elapsed / total) * 100));
    }

    // ── STATE ────────────────────────────────────────────────────────────────
    let currentWeek = detectWeek();

    const todayJS = new Date().getDay(); // 0=Sun, 1=Mon ... 6=Sat
    // Map JS day to our 1-5 system (Mon=1 ... Fri=5); weekend → Monday
    let todayAppDay = (todayJS >= 1 && todayJS <= 5) ? todayJS : 1;
    let currentDay = todayAppDay;

    // ── UI HELPERS ───────────────────────────────────────────────────────────
    function updateWeekInfo() {
        const weekNum = getISOWeekNumber(new Date());
        const label = currentWeek === 'N' ? 'Nieparzysty (N)' : 'Parzysty (P)';
        document.getElementById('weekInfo').innerHTML =
            `Tydzień ${weekNum} — <span>${label}</span>`;
    }

    function updateTimeDisplay() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('timeDisplay').innerHTML =
            `Aktualny czas: <b>${hh}:${mm}</b>`;
    }

    function setWeek(w) {
        currentWeek = w;
        document.getElementById('optN').classList.toggle('active', w === 'N');
        document.getElementById('optP').classList.toggle('active', w === 'P');
        updateWeekInfo();
        render();
    }

    function changeDay(d) {
        currentDay = d;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, i) => t.classList.toggle('active', i + 1 === d));
        render();
    }

    // ── RENDER ───────────────────────────────────────────────────────────────
    function render() {
        const container = document.getElementById('schedule');
        container.innerHTML = '';

        const lessons = data[currentDay] || [];
        const filtered = lessons.filter(l => l.type === 'O' || l.type === currentWeek);

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">🎉 Brak zajęć w tym dniu!</div>';
            return;
        }

        const isToday = (currentDay === todayAppDay);

        filtered.forEach(l => {
            const card = document.createElement('div');
            card.className = 'lesson-card';

            const borderColor = l.type === 'N' ? 'var(--n-color)'
                             : l.type === 'P' ? 'var(--p-color)'
                             : 'var(--primary)';
            card.style.borderLeftColor = borderColor;

            let statusClass = '';
            let progressHTML = '';

            if (isToday) {
                const status = getLessonStatus(l);
                if (status === 'now') {
                    statusClass = 'is-now';
                    const pct = getProgressPercent(l);
                    progressHTML = `<div class="progress-bar" style="width:${pct}%"></div>`;
                } else if (status === 'past') {
                    statusClass = 'is-past';
                }
            }

            card.classList.add(...(statusClass ? [statusClass] : []));

            card.innerHTML = `
                <div class="time-box">${l.time}</div>
                <div class="info-box">
                    <div class="subject">${l.name}</div>
                    <div class="room">📍 Sala: ${l.room}</div>
                </div>
                ${progressHTML}
            `;
            container.appendChild(card);
        });
    }

    // ── MARK TODAY TAB ───────────────────────────────────────────────────────
    function markTodayTab() {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, i) => {
            if (i + 1 === todayAppDay) t.classList.add('today-tab');
        });
    }

    // ── LIVE REFRESH ─────────────────────────────────────────────────────────
    // Re-render every 60 seconds so "is-now" stays accurate
    function tick() {
        updateTimeDisplay();
        render(); // re-render to refresh progress & status
    }

    // ── INIT ─────────────────────────────────────────────────────────────────
    markTodayTab();
    setWeek(currentWeek);      // sets toggle + weekInfo + renders
    changeDay(currentDay);     // selects today's tab + renders

    updateTimeDisplay();
    setInterval(tick, 60000);  // update every minute
</script>

</body>
</html>
