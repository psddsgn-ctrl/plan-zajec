<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan zajęć – 12M2</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' rx='18' fill='%231a1f26'/%3E%3Cpath d='M10,20 V80 H90 V20 H70 V30 H60 V20 H40 V30 H30 V20 H10' fill='none' stroke='%23A12A7C' stroke-width='5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='22' fill='none' stroke='%23A12A7C' stroke-width='5'/%3E%3Cpath d='M50,23 L50,28 M68,30 L65,33 M77,50 L72,50 M68,70 L65,67 M50,77 L50,72 M32,70 L35,67 M23,50 L28,50 M32,30 L35,33' fill='none' stroke='%23A12A7C' stroke-width='5'/%3E%3Cpath d='M42,57 L42,43 L50,51 L58,43 L58,57' fill='none' stroke='%23A12A7C' stroke-width='4.5' stroke-linecap='round'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="12M2">
    <meta name="apple-mobile-web-app-title" content="12M2">
    <meta name="theme-color" content="#1a1f26">
    <meta name="msapplication-navbutton-color" content="#1a1f26">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">

    <style>
        :root {
            --bg: #1a1f26;
            --card-bg: #2c333a;
            --text: #e0e0e0;
            --primary: #4cc9f0;
            --secondary: #8d99ae;
            --n-color: #f72585;
            --p-color: #4cc9f0;
            --shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        header {
            background: var(--bg);
            padding: 26px 15px 20px;
            text-align: center;
            border-radius: 0 0 20px 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .app-logo { width: 84px; height: 84px; }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 15px 8px;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg);
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }
        .week-toggle {
            display: flex;
            background: var(--card-bg);
            padding: 4px;
            border-radius: 14px;
            box-shadow: var(--shadow);
        }
        .week-opt {
            padding: 7px 18px;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            font-size: 0.88em;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }
        .week-opt.active { background: var(--primary); color: #1a1f26; }

        .icon-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            color: var(--text);
            border: none;
            padding: 9px 14px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.84em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.15s;
            white-space: nowrap;
        }
        .icon-btn:active { transform: scale(0.95); }

        /* ── TABS ── */
        .tabs {
            display: flex;
            justify-content: center;
            padding: 10px 10px 6px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 9px 16px;
            background: var(--card-bg);
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: var(--shadow);
            font-size: 0.88em;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .tab.active { background: var(--primary); color: #1a1f26; }
        .tab.today-tab::after {
            content: '';
            position: absolute;
            bottom: 5px; left: 50%;
            transform: translateX(-50%);
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--primary);
        }
        .tab.today-tab.active::after { background: #1a1f26; }

        .tl-wrapper { max-width: 480px; margin: 14px auto 0; padding: 0 14px; overflow: hidden; }
        .tl-grid { display: flex; position: relative; }
        .tl-labels { width: 44px; flex-shrink: 0; position: relative; }
        .tl-events {
            flex: 1;
            position: relative;
            border-left: 2px solid rgba(141,153,174,0.25);
            margin-left: 6px;
        }
        .tl-hour-label {
            position: absolute; right: 8px;
            font-size: 0.65em; color: var(--secondary); opacity: 0.7;
            transform: translateY(-50%); white-space: nowrap;
        }
        .tl-hour-line {
            position: absolute; top: 0; left: -8px; right: 0;
            height: 1px; background: rgba(141,153,174,0.15);
        }
        .tl-half-line {
            position: absolute; left: 0; right: 0;
            height: 1px; background: rgba(141,153,174,0.07);
        }
        .tl-block {
            position: absolute; left: 8px; right: 6px;
            border-radius: 10px; padding: 7px 10px;
            display: flex; flex-direction: column; justify-content: center;
            overflow: hidden; cursor: default;
            transition: opacity 0.3s;
        }
        .tl-block .b-name { font-size:.78em; font-weight:600; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tl-block .b-room { font-size:.65em; opacity:.75; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tl-block .b-time { font-size:.6em; opacity:.6; margin-top:1px; }
        .tl-block.is-past { opacity: 0.35; }
        .tl-block.is-now { box-shadow: 0 0 0 2px rgba(255,255,255,0.3), 0 4px 16px rgba(0,0,0,0.4); }
        .now-badge {
            position: absolute; top:6px; right:8px;
            font-size:.56em; font-weight:600; letter-spacing:.07em;
            color: rgba(255,255,255,0.9);
            display:flex; align-items:center; gap:3px;
        }
        .now-dot { width:5px; height:5px; border-radius:50%; background:white; animation:blink 1.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
        .tl-progress {
            position:absolute; bottom:0; left:0;
            height:3px; border-radius:0 0 0 10px; background:rgba(255,255,255,0.5);
        }
        .tl-needle {
            position:absolute; left:-10px; right:0;
            height:2px; background:#ff4455; border-radius:1px;
            transform:translateY(-50%); z-index:20; pointer-events:none;
        }
        .tl-needle::before {
            content:''; position:absolute; left:-2px; top:-4px;
            width:10px; height:10px; border-radius:50%; background:#ff4455;
        }
        .tl-empty { text-align:center; padding:50px 20px; opacity:.45; font-size:.95em; }

        /* ── TIMELINE SLIDE ANIMATION ── */
        @keyframes slideInRight  { from { opacity:0; transform:translateX(52px);  } to { opacity:1; transform:translateX(0); } }
        @keyframes slideInLeft   { from { opacity:0; transform:translateX(-52px); } to { opacity:1; transform:translateX(0); } }
        @keyframes weekPop { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 70%{transform:scale(0.96)} 100%{transform:scale(1)} }
        .tl-grid.slide-in-right { animation: slideInRight 0.28s cubic-bezier(0.22,1,0.36,1) both; }
        .tl-grid.slide-in-left  { animation: slideInLeft  0.28s cubic-bezier(0.22,1,0.36,1) both; }
        .week-toggle.pop { animation: weekPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes tlFade { from{opacity:0;transform:translateY(10px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }
        .tl-grid.week-fade { animation: tlFade 0.3s cubic-bezier(0.22,1,0.36,1) both; }

        /* ── SHARED PANEL STYLES ── */
        .panel-overlay {
            visibility: hidden;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            z-index: 100;
            transition: background 0.32s ease, backdrop-filter 0.32s ease, visibility 0s linear 0.36s;
        }
        .panel-overlay.open {
            visibility: visible;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: background 0.32s ease, backdrop-filter 0.32s ease, visibility 0s linear 0s;
        }
        .panel {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: min(360px, 94vw);
            background: #1e242c;
            overflow-y: auto;
            padding: 20px 18px 40px;
            transform: translateX(100%);
            transition: transform 0.36s cubic-bezier(0.32,0.72,0,1), box-shadow 0.36s ease;
            box-shadow: -8px 0 0px rgba(0,0,0,0);
            z-index: 101;
        }
        .panel-overlay.open .panel {
            transform: translateX(0);
            box-shadow: -8px 0 60px rgba(0,0,0,0.6);
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px;
        }
        .panel-header h2 { margin:0; font-size:1.05em; font-weight:600; color:var(--primary); }
        .panel-close {
            background: var(--card-bg); border: none; color: var(--text);
            width:32px; height:32px; border-radius:9px; cursor:pointer;
            font-size:1em; display:flex; align-items:center; justify-content:center;
        }

        /* ── CALENDAR PANEL ── */
        .mini-cal { width: 100%; }
        .mini-cal-nav {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .mini-cal-nav span { font-size:.9em; font-weight:600; color:var(--text); }
        .nav-btn {
            background: var(--card-bg); border:none; color:var(--text);
            width:30px; height:30px; border-radius:8px; cursor:pointer;
            font-size:.9em; display:flex; align-items:center; justify-content:center;
        }
        .cal-grid {
            display: grid; grid-template-columns: repeat(7,1fr);
            gap: 3px; text-align: center;
        }
        .cal-dow {
            font-size:.6em; font-weight:600; color:var(--secondary);
            padding: 4px 0; text-transform: uppercase; letter-spacing:.06em;
        }
        .cal-day {
            font-size:.75em; padding: 5px 2px; border-radius:7px;
            line-height:1; cursor:default; position:relative;
            display:flex; flex-direction:column; align-items:center; gap:2px;
        }
        .cal-day.empty { opacity:0; pointer-events:none; }
        .cal-day.today { background: var(--primary); color:#1a1f26; font-weight:600; border-radius:50%; }
        .cal-day.weekend { color: var(--secondary); }
        .cal-day.holiday { color: #f72585; font-weight:600; }
        .cal-day.break   { color: #ff9f43; font-weight:600; }
        .cal-day.exam    { color: #a8e063; font-weight:600; }
        .cal-dot-row { display:flex; gap:2px; justify-content:center; }
        .cal-micro-dot { width:4px; height:4px; border-radius:50%; }

        .cal-legend { display:flex; flex-wrap:wrap; gap:8px 16px; margin-bottom:14px; }
        .leg { display:flex; align-items:center; gap:5px; font-size:.72em; color:var(--secondary); }
        .leg-d { width:8px; height:8px; border-radius:50%; }

        .events-below { margin-top: 14px; }
        .ev-month-title {
            font-size:.68em; font-weight:600; text-transform:uppercase;
            letter-spacing:.08em; color:var(--secondary);
            padding: 6px 0 4px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom:6px;
        }
        .ev-item {
            display:flex; align-items:flex-start; gap:10px;
            padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.04);
            font-size:.78em;
        }
        .ev-item:last-child { border-bottom:none; }
        .ev-dot { width:8px; height:8px; border-radius:50%; margin-top:3px; flex-shrink:0; }
        .ev-date { min-width:56px; font-weight:600; color:var(--primary); font-size:.9em; }
        .ev-name { color:var(--text); line-height:1.4; }

        /* ── KOLOKWIA PANEL ── */
        .kol-type-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: .62em; font-weight: 700; padding: 3px 9px;
            border-radius: 20px; text-transform: uppercase; letter-spacing: .06em;
        }
        .kol-type-kol  { background: rgba(168,224,99,.18); color: #a8e063; border: 1px solid rgba(168,224,99,.35); }
        .kol-type-wej  { background: rgba(255,159,67,.18);  color: #ff9f43; border: 1px solid rgba(255,159,67,.35); }
        .kol-type-egz  { background: rgba(247,37,133,.18);  color: #f72585; border: 1px solid rgba(247,37,133,.35); }

        .kol-add-btn {
            display: flex; align-items: center; justify-content: center; gap: 7px;
            width: 100%; padding: 11px; border-radius: 12px; cursor: pointer;
            background: rgba(76,201,240,.12); border: 1.5px dashed rgba(76,201,240,.4);
            color: var(--primary); font-family: inherit; font-size: .88em; font-weight: 600;
            transition: background .2s;
            margin-bottom: 14px;
        }
        .kol-add-btn:hover { background: rgba(76,201,240,.2); }

        .kol-card {
            background: var(--card-bg); border-radius: 14px; padding: 12px 14px;
            margin-bottom: 10px; cursor: pointer;
            border-left: 3px solid transparent;
            transition: transform .15s, box-shadow .15s;
            position: relative;
        }
        .kol-card:active { transform: scale(.98); }
        .kol-card.type-kol { border-left-color: #a8e063; }
        .kol-card.type-wej { border-left-color: #ff9f43; }
        .kol-card.type-egz { border-left-color: #f72585; }
        .kol-card.is-past  { opacity: .45; }
        .kol-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
        .kol-card-subject { font-size: .9em; font-weight: 600; color: var(--text); line-height: 1.3; }
        .kol-card-date { font-size: .72em; color: var(--primary); font-weight: 600; white-space: nowrap; }
        .kol-card-time { font-size: .68em; color: var(--secondary); margin-top: 2px; }
        .kol-card-delete {
            position: absolute; top: 10px; right: 10px;
            background: rgba(247,37,133,.15); border: none; color: #f72585;
            width: 26px; height: 26px; border-radius: 7px; cursor: pointer;
            font-size: .8em; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .2s;
        }
        .kol-card:hover .kol-card-delete { opacity: 1; }

        /* Weekly calendar */
        .week-cal {
            margin-bottom: 16px;
            background: rgba(255,255,255,.03);
            border-radius: 14px; overflow: hidden;
        }
        .week-cal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px 8px;
        }
        .week-cal-title { font-size: .78em; font-weight: 600; color: var(--secondary); }
        .week-cal-nav { display: flex; gap: 4px; }
        .week-cal-nav button {
            background: var(--card-bg); border: none; color: var(--text);
            width: 26px; height: 26px; border-radius: 7px; cursor: pointer; font-size: .85em;
        }
        .week-cal-days {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 0;
        }
        .wc-day {
            display: flex; flex-direction: column; align-items: center;
            padding: 6px 2px 8px; cursor: pointer;
            border-radius: 0; transition: background .15s;
            position: relative; min-height: 52px;
        }
        .wc-day:hover { background: rgba(255,255,255,.04); }
        .wc-day-label { font-size: .58em; font-weight: 600; color: var(--secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
        .wc-day-num { font-size: .78em; font-weight: 600; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .wc-day.today .wc-day-num { background: var(--primary); color: #1a1f26; }
        .wc-day.weekend .wc-day-label { color: rgba(141,153,174,.5); }
        .wc-dots { display: flex; gap: 2px; justify-content: center; margin-top: 3px; flex-wrap: wrap; max-width: 28px; }
        .wc-dot { width: 5px; height: 5px; border-radius: 50%; }

        /* Add form modal */
        .kol-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
            z-index: 200; align-items: flex-end; justify-content: center;
        }
        .kol-modal-overlay.open { display: flex; }
        .kol-modal {
            background: #1e242c; border-radius: 24px 24px 0 0;
            width: 100%; max-width: 480px; padding: 20px 18px 36px;
            animation: slideUp .32s cubic-bezier(0.32,0.72,0,1);
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .kol-modal-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.15); margin: 0 auto 18px; }
        .kol-modal-title { font-size: 1em; font-weight: 600; margin-bottom: 16px; color: var(--primary); }
        .kol-form-row { margin-bottom: 12px; }
        .kol-form-label { font-size: .72em; font-weight: 600; color: var(--secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; display: block; }
        .kol-form-input, .kol-form-select, .kol-form-textarea {
            width: 100%; background: var(--card-bg); border: 1.5px solid rgba(255,255,255,.08);
            color: var(--text); padding: 10px 12px; border-radius: 10px;
            font-family: inherit; font-size: .9em;
            transition: border-color .2s;
        }
        .kol-form-input:focus, .kol-form-select:focus, .kol-form-textarea:focus {
            outline: none; border-color: var(--primary);
        }
        .kol-form-select option { background: #2c333a; }
        .kol-form-textarea { resize: none; height: 68px; }
        .kol-form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .kol-type-selector { display: flex; gap: 8px; }
        .kol-type-opt {
            flex: 1; padding: 9px 4px; border-radius: 10px; text-align: center;
            font-size: .78em; font-weight: 700; cursor: pointer;
            border: 1.5px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04);
            color: var(--secondary); transition: all .2s;
        }
        .kol-type-opt.sel-kol { background: rgba(168,224,99,.18); border-color: #a8e063; color: #a8e063; }
        .kol-type-opt.sel-wej { background: rgba(255,159,67,.18);  border-color: #ff9f43; color: #ff9f43; }
        .kol-type-opt.sel-egz { background: rgba(247,37,133,.18);  border-color: #f72585; color: #f72585; }
        .kol-submit-btn {
            width: 100%; padding: 13px; border-radius: 12px; border: none;
            background: var(--primary); color: #1a1f26; font-family: inherit;
            font-size: .95em; font-weight: 700; cursor: pointer; margin-top: 4px;
            transition: opacity .2s;
        }
        .kol-submit-btn:disabled { opacity: .5; cursor: not-allowed; }

        /* Detail modal */
        .kol-detail-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
            z-index: 200; align-items: flex-end; justify-content: center;
        }
        .kol-detail-overlay.open { display: flex; }
        .kol-detail-modal {
            background: #1e242c; border-radius: 24px 24px 0 0;
            width: 100%; max-width: 480px; padding: 20px 18px 40px;
            animation: slideUp .32s cubic-bezier(0.32,0.72,0,1);
        }
        .kol-detail-subject { font-size: 1.2em; font-weight: 700; margin: 10px 0 6px; }
        .kol-detail-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06); font-size: .88em; color: var(--secondary); }
        .kol-detail-row:last-child { border-bottom: none; }
        .kol-detail-row strong { color: var(--text); }
        .kol-detail-notes { margin-top: 10px; background: rgba(255,255,255,.04); border-radius: 10px; padding: 10px 12px; font-size: .84em; color: var(--text); line-height: 1.5; }

        /* Firebase status */
        .fb-status {
            font-size: .65em; color: var(--secondary); text-align: center;
            padding: 4px 0 8px; opacity: .6;
        }
        .fb-status.error { color: #f72585; opacity: 1; }

        .kol-empty { text-align: center; padding: 30px 20px; opacity: .4; font-size: .88em; }

        .kol-section-title {
            font-size: .68em; font-weight: 700; text-transform: uppercase;
            letter-spacing: .08em; color: var(--secondary);
            padding: 8px 0 4px; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: 8px;
        }

    </style>
</head>
<body>

<!-- ── CALENDAR OVERLAY ── -->
<div class="panel-overlay" id="calOverlay" onclick="closePanelIfOutside(event,'calOverlay')">
    <div class="panel" id="calPanel">
        <div class="panel-header">
            <h2>📅 Kalendarz PK 2025/26</h2>
            <button class="panel-close" onclick="closePanel('calOverlay')">✕</button>
        </div>

        <div class="cal-legend">
            <div class="leg"><div class="leg-d" style="background:#f72585"></div>Święto</div>

// ═══════════════════════════════════════════════════════════
// HOLIDAYS / EVENTS DATA (from PK regulation)
// type: holiday=red, break=orange, exam=green
// ═══════════════════════════════════════════════════════════
const PK_EVENTS = [
    // Semestr zimowy
    {from:[2025,9,2],  to:[2025,9,2],  label:"Inauguracja roku",         type:"break"},
    {from:[2025,9,31], to:[2025,10,2], label:"Wszystkich Świętych",       type:"holiday"},
    {from:[2025,10,10],to:[2025,10,10],label:"Dzień wolny (święto w sob)",type:"break"},
    {from:[2025,10,11],to:[2025,10,11],label:"Święto Niepodległości",     type:"holiday"},
    {from:[2025,11,18],to:[2025,11,18],label:"Wigilia Akademicka",        type:"break"},
    {from:[2025,11,22],to:[2026,0,6],  label:"Boże Narodzenie",           type:"holiday"},
    // Sesja
    {from:[2026,0,29], to:[2026,1,10], label:"Sesja egzaminacyjna",       type:"exam"},
    {from:[2026,1,11], to:[2026,1,17], label:"Sesja poprawkowa",          type:"exam"},
    {from:[2026,1,18], to:[2026,1,22], label:"Wakacje zimowe",            type:"break"},
    // Semestr letni
    {from:[2026,3,1],  to:[2026,3,7],  label:"Wielkanoc",                 type:"holiday"},
    {from:[2026,4,1],  to:[2026,4,1],  label:"Święto Pracy",              type:"holiday"},
    {from:[2026,4,1],  to:[2026,4,4],  label:"Rajd PK",                   type:"break"},
    {from:[2026,4,3],  to:[2026,4,3],  label:"Konstytucja 3 Maja",        type:"holiday"},
    {from:[2026,4,12], to:[2026,4,12], label:"Święto Szkoły",             type:"break"},
    {from:[2026,4,24], to:[2026,4,24], label:"Zielone Świątki",           type:"holiday"},
    {from:[2026,5,4],  to:[2026,5,5],  label:"Boże Ciało",                type:"holiday"},
    // Sesja letnia
    {from:[2026,5,17], to:[2026,5,30], label:"Sesja egzaminacyjna",       type:"exam"},
    {from:[2026,6,1],  to:[2026,7,31], label:"Wakacje letnie",            type:"break"},
    {from:[2026,8,1],  to:[2026,8,15], label:"Sesja poprawkowa",          type:"exam"},
];

// Convert PK_EVENTS to a flat map: "YYYY-M-D" -> {type, labels[]}
const DAY_MAP = {};
function addToMap(y,m,d,ev){
    const k=`${y}-${m}-${d}`;
    if(!DAY_MAP[k]) DAY_MAP[k]={type:ev.type,labels:[]};
    // type priority: holiday > break > exam
    const pri={holiday:3,break:2,exam:1};
    if((pri[ev.type]||0) > (pri[DAY_MAP[k].type]||0)) DAY_MAP[k].type=ev.type;
    if(!DAY_MAP[k].labels.includes(ev.label)) DAY_MAP[k].labels.push(ev.label);
}
PK_EVENTS.forEach(ev=>{
    const s=new Date(ev.from[0],ev.from[1],ev.from[2]);
    const e=new Date(ev.to[0],  ev.to[1],  ev.to[2]);
    for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
        addToMap(d.getFullYear(),d.getMonth(),d.getDate(),ev);
    }
});

// ═══════════════════════════════════════════════════════════
// MINI CALENDAR
// ═══════════════════════════════════════════════════════════
const TODAY = new Date();
let calYear  = TODAY.getFullYear();
let calMonth = TODAY.getMonth();
const MONTHS_PL = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec',
                   'Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const DAYS_PL = ['Pn','Wt','Śr','Cz','Pt','So','Nd'];

function buildCal(){
    document.getElementById('calMonthLabel').textContent = `${MONTHS_PL[calMonth]} ${calYear}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    // Day-of-week headers
    DAYS_PL.forEach(d=>{
        const h=document.createElement('div');
        h.className='cal-dow'; h.textContent=d;
        grid.appendChild(h);
    });

    const first = new Date(calYear,calMonth,1);
    // JS: 0=Sun, we want 0=Mon
    let startDow = (first.getDay()+6)%7;
    const daysInMonth = new Date(calYear,calMonth+1,0).getDate();

    // Empty cells
    for(let i=0;i<startDow;i++){
        const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e);
    }

    for(let d=1;d<=daysInMonth;d++){
        const cell=document.createElement('div');
        cell.className='cal-day';
        const dow=(startDow+d-1)%7;
        if(dow>=5) cell.classList.add('weekend');

        const k=`${calYear}-${calMonth}-${d}`;
        const ev=DAY_MAP[k];
        if(ev){
            cell.classList.add(ev.type==='holiday'?'holiday': ev.type==='exam'?'exam':'break');
            const dot=document.createElement('div');
            dot.className='cal-micro-dot';
            dot.style.background = ev.type==='holiday'?'#f72585': ev.type==='exam'?'#a8e063':'#ff9f43';
            const dr=document.createElement('div'); dr.className='cal-dot-row'; dr.appendChild(dot);
            // number first
            const numSpan=document.createElement('span'); numSpan.textContent=d;
            cell.appendChild(numSpan); cell.appendChild(dr);
        } else {
            cell.textContent=d;
        }

        // Today highlight
        if(d===TODAY.getDate() && calMonth===TODAY.getMonth() && calYear===TODAY.getFullYear()){
            cell.classList.add('today'); cell.innerHTML=d;
        }

        grid.appendChild(cell);
    }

    // Events list below calendar for this month
    buildEventsBelow();
}

function buildEventsBelow(){
    const el=document.getElementById('eventsBelow');
    el.innerHTML='';
    const monthEvents=[];
    for(let d=1;d<=31;d++){
        const k=`${calYear}-${calMonth}-${d}`;
        if(DAY_MAP[k]){
            // find first day of this streak
            const prev=`${calYear}-${calMonth}-${d-1}`;
            if(!DAY_MAP[prev] || DAY_MAP[prev].labels[0]!==DAY_MAP[k].labels[0]){
                monthEvents.push({day:d, ...DAY_MAP[k]});
            }
        }
    }
    if(!monthEvents.length) return;

    const title=document.createElement('div');
    title.className='ev-month-title'; title.textContent=`${MONTHS_PL[calMonth]} ${calYear}`;
    el.appendChild(title);

    monthEvents.forEach(ev=>{
        const item=document.createElement('div'); item.className='ev-item';
        const dot=document.createElement('div'); dot.className='ev-dot';
        dot.style.background=ev.type==='holiday'?'#f72585':ev.type==='exam'?'#a8e063':'#ff9f43';
        const date=document.createElement('div'); date.className='ev-date';
        date.textContent=`${ev.day} ${MONTHS_PL[calMonth].slice(0,3)}`;
        const name=document.createElement('div'); name.className='ev-name';
        name.textContent=ev.labels[0];
        item.appendChild(dot); item.appendChild(date); item.appendChild(name);
        el.appendChild(item);
    });
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} buildCal(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} buildCal(); }



// ═══════════════════════════════════════════════════════════
// PANEL OPEN/CLOSE
// ═══════════════════════════════════════════════════════════
function openPanel(id){
    document.getElementById(id).classList.add('open');
    if(id==='calOverlay') buildCal();
}

// ═══════════════════════════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════════════════════════
const FULL_START=7*60, FULL_END=20*60, PX_PER_MIN=1.55;
const BG ={N:'#f72585',P:'#4cc9f0',O:'#4cc9f0'};
const BG2={N:'rgba(247,37,133,.18)',P:'rgba(76,201,240,.18)',O:'rgba(76,201,240,.18)'};

function detectWeek(){
    const REF=new Date(2025,9,1);
    const diff=Math.floor((new Date()-REF)/86400000);
    if(diff<0) return 'N';
    return (Math.floor(diff/7)%2===0)?'N':'P';
}
function toMin(s){ const[h,m]=s.split(':').map(Number); return h*60+m; }
function parseRange(t){ const[a,b]=t.split('-'); return{start:toMin(a),end:toMin(b)}; }
function getNowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }

const autoWeek=detectWeek();
let currentWeek=autoWeek;
const todayJS=new Date().getDay();
let todayAppDay=(todayJS>=1&&todayJS<=5)?todayJS:1;
let currentDay=todayAppDay;
function isLiveView(){ return currentDay===todayAppDay&&currentWeek===autoWeek; }

let _lastDay = null;

function animateTlGrid(cls){
    const grid = document.querySelector('.tl-grid');
    grid.classList.remove('slide-in-right','slide-in-left','week-fade');
    void grid.offsetWidth; // reflow
    grid.classList.add(cls);
}

function render(){
    const labelsEl=document.getElementById('tlLabels');
    const eventsEl=document.getElementById('tlEvents');
    labelsEl.innerHTML=''; eventsEl.innerHTML='';
    const lessons=data[currentDay]||[];
    const filtered=lessons.filter(l=>l.type==='O'||l.type===currentWeek);
    if(!filtered.length){
        eventsEl.innerHTML='<div class="tl-empty">🎉 Brak zajęć w tym dniu!</div>';
        labelsEl.style.height=eventsEl.style.height='80px'; return;
    }
    const times=filtered.map(l=>parseRange(l.time));
    const dayStart=Math.max(FULL_START,Math.min(...times.map(t=>t.start))-30);
    const dayEnd=Math.min(FULL_END,Math.max(...times.map(t=>t.end))+30);
    const totalPx=(dayEnd-dayStart)*PX_PER_MIN;
    labelsEl.style.height=eventsEl.style.height=totalPx+'px';
    function px(m){ return(m-dayStart)*PX_PER_MIN; }

    for(let h=Math.ceil(dayStart/60);h<=Math.floor(dayEnd/60);h++){
        const lbl=document.createElement('div');
        lbl.className='tl-hour-label'; lbl.style.top=px(h*60)+'px';
        lbl.textContent=String(h).padStart(2,'0')+':00'; labelsEl.appendChild(lbl);
        const rule=document.createElement('div');
        rule.className='tl-hour-line'; rule.style.top=px(h*60)+'px'; eventsEl.appendChild(rule);
        const hm=h*60+30;
        if(hm<dayEnd){ const half=document.createElement('div'); half.className='tl-half-line'; half.style.top=px(hm)+'px'; eventsEl.appendChild(half); }
    }

    const live=isLiveView(), nowMin=getNowMin();
    filtered.forEach(l=>{
        const{start,end}=parseRange(l.time);
        const topPx=px(start), heightPx=Math.max((end-start)*PX_PER_MIN,30);
        const block=document.createElement('div'); block.className='tl-block';
        block.style.top=topPx+'px'; block.style.height=heightPx+'px';
        block.style.background=BG2[l.type]||BG2.O;
        block.style.borderLeft=`3px solid ${BG[l.type]||BG.O}`;
        if(live){
            if(nowMin>=start&&nowMin<end){
                block.classList.add('is-now');
                block.style.background=(BG[l.type]||BG.O)+'33';
                const pct=Math.round(((nowMin-start)/(end-start))*100);
                block.innerHTML+=`<div class="now-badge"><div class="now-dot"></div>TERAZ</div><div class="tl-progress" style="width:${pct}%"></div>`;
            } else if(nowMin>=end){ block.classList.add('is-past'); }
        }
        const nc=BG[l.type]||BG.O;
        block.innerHTML+=`<div class="b-name" style="color:${nc}">${l.name}</div>${heightPx>=42?`<div class="b-room">📍 ${l.room}</div>`:''}${heightPx>=56?`<div class="b-time">${l.time}</div>`:''}`;
        eventsEl.appendChild(block);
    });

    if(live&&nowMin>=dayStart&&nowMin<=dayEnd){
        const needle=document.createElement('div'); needle.className='tl-needle';
        needle.style.top=px(nowMin)+'px'; eventsEl.appendChild(needle);
    }

    // Scroll needle into view on initial load
    if(live && !render._scrolled){
        render._scrolled = true;
        requestAnimationFrame(()=>{
            const needle = eventsEl.querySelector('.tl-needle');
            if(needle){
                const wrapperRect = document.querySelector('.tl-wrapper').getBoundingClientRect();
                const needleTop = needle.getBoundingClientRect().top;
                const offset = needleTop - window.innerHeight * 0.4;
                window.scrollBy({ top: offset, behavior: 'smooth' });
            }
        });
    }
}

function setWeek(w){
    const prev = currentWeek;
    currentWeek=w;
    document.getElementById('optN').classList.toggle('active',w==='N');
    document.getElementById('optP').classList.toggle('active',w==='P');
    if(prev !== w){
        const tog = document.getElementById('optN').closest('.week-toggle');
        tog.classList.remove('pop'); void tog.offsetWidth; tog.classList.add('pop');
        animateTlGrid('week-fade');
    }
    render();
}
function changeDay(d){
    const prev = currentDay;
    currentDay=d;
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i+1===d));
    if(prev !== d) animateTlGrid(d > prev ? 'slide-in-right' : 'slide-in-left');
    render();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach((t,i)=>{ if(i+1===todayAppDay) t.classList.add('today-tab'); });
setWeek(currentWeek);
changeDay(currentDay);
setInterval(render,60000);
</script>

<!-- ── FIREBASE SDK ── -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ⚠️ UZUPEŁNIJ SWOJĄ KONFIGURACJĘ FIREBASE (Project Settings → Your apps → firebaseConfig)
const firebaseConfig = {
    apiKey:            "TWOJ_API_KEY",
    authDomain:        "TWOJ_PROJECT.firebaseapp.com",
    projectId:         "TWOJ_PROJECT_ID",
    storageBucket:     "TWOJ_PROJECT.appspot.com",
    messagingSenderId: "TWOJ_SENDER_ID",
    appId:             "TWOJ_APP_ID"
};

let db, kolCollection;
let allKols = [];

try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    kolCollection = collection(db, 'kolokwia');

    const q = query(kolCollection, orderBy('dateMs'));
    onSnapshot(q, (snapshot) => {
        allKols = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        document.getElementById('fbStatus').textContent = '✅ Połączono z bazą danych';
        document.getElementById('fbStatus').classList.remove('error');
        renderKolList();
        renderWeekCal();
        updateBadge();
    });
} catch(e) {
    document.getElementById('fbStatus').textContent = '❌ Błąd połączenia – sprawdź konfigurację Firebase';
    document.getElementById('fbStatus').classList.add('error');
    console.error('Firebase init error:', e);
}

// ── WEEK CALENDAR ──
const WC_DAYS_PL = ['Pn','Wt','Śr','Cz','Pt','So','Nd'];
let wcOffset = 0; // weeks offset from current

function getWeekStart(offset) {
    const now = new Date();
    const dow = (now.getDay() + 6) % 7; // 0=Mon
    const ms = now.getTime() - dow * 86400000 + offset * 7 * 86400000;
    return new Date(ms);
}

function renderWeekCal() {
    const start = getWeekStart(wcOffset);
    const end = new Date(start.getTime() + 6 * 86400000);
    const fmt = d => `${d.getDate()} ${['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'][d.getMonth()]}`;
    document.getElementById('wcTitle').textContent = `${fmt(start)} – ${fmt(end)}`;

    const container = document.getElementById('wcDays');
    container.innerHTML = '';
    const today = new Date(); today.setHours(0,0,0,0);

    for (let i = 0; i < 7; i++) {
        const day = new Date(start.getTime() + i * 86400000);
        day.setHours(0,0,0,0);
        const cell = document.createElement('div');
        cell.className = 'wc-day' + (i >= 5 ? ' weekend' : '');
        if (day.getTime() === today.getTime()) cell.classList.add('today');

        const dayKols = allKols.filter(k => {
            const kd = new Date(k.dateMs); kd.setHours(0,0,0,0);
            return kd.getTime() === day.getTime();
        });

        cell.innerHTML = `<div class="wc-day-label">${WC_DAYS_PL[i]}</div>
            <div class="wc-day-num">${day.getDate()}</div>
            <div class="wc-dots">${dayKols.map(k => `<div class="wc-dot" style="background:${kolColor(k.type)}"></div>`).join('')}</div>`;

        if (dayKols.length > 0) {
            cell.title = dayKols.map(k => k.subject).join(', ');
            cell.style.cursor = 'pointer';
            cell.onclick = () => {
                // Show first event of the day
                openDetailModal(dayKols[0]);
            };
        }
        container.appendChild(cell);
    }
}

function wcPrev() { wcOffset--; renderWeekCal(); }
function wcNext() { wcOffset++; renderWeekCal(); }
window.wcPrev = wcPrev;
window.wcNext = wcNext;

// ── LIST ──
function kolColor(type) {
    return type === 'kol' ? '#a8e063' : type === 'wej' ? '#ff9f43' : '#f72585';
}
function kolLabel(type) {
    return type === 'kol' ? 'Kolokwium' : type === 'wej' ? 'Wejściówka' : 'Egzamin';
}

function renderKolList() {
    const container = document.getElementById('kolList');
    const now = Date.now();
    const upcoming = allKols.filter(k => k.dateMs >= now);
    const past     = allKols.filter(k => k.dateMs < now);

    let html = '';
    if (!allKols.length) {
        html = '<div class="kol-empty">🎉 Brak wpisów<br><span style="font-size:.82em">Dodaj pierwsze kolokwium!</span></div>';
    } else {
        if (upcoming.length) {
            html += `<div class="kol-section-title">Nadchodzące (${upcoming.length})</div>`;
            html += upcoming.map(k => kolCardHTML(k, false)).join('');
        }
        if (past.length) {
            html += `<div class="kol-section-title" style="margin-top:12px">Minione</div>`;
            html += past.reverse().map(k => kolCardHTML(k, true)).join('');
        }
    }
    container.innerHTML = html;
}

function kolCardHTML(k, isPast) {
    const d = new Date(k.dateMs);
    const dateStr = `${d.getDate()} ${['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'][d.getMonth()]} ${d.getFullYear()}`;
    const timeStr = k.time ? k.time : '';
    const color = kolColor(k.type);
    const label = kolLabel(k.type);
    return `<div class="kol-card type-${k.type}${isPast?' is-past':''}" onclick="openDetailModal(${JSON.stringify(k).replace(/"/g,'&quot;')})">
        <button class="kol-card-delete" onclick="event.stopPropagation();deleteKol('${k.id}')" title="Usuń">✕</button>
        <div class="kol-card-top">
            <div>
                <span class="kol-type-badge kol-type-${k.type}">${label}</span>
                <div class="kol-card-subject" style="margin-top:5px">${k.subject}</div>
            </div>
            <div style="text-align:right">
                <div class="kol-card-date" style="color:${color}">${dateStr}</div>
                ${timeStr ? `<div class="kol-card-time">🕐 ${timeStr}</div>` : ''}
                ${k.room ? `<div class="kol-card-time">📍 ${k.room}</div>` : ''}
            </div>
        </div>
    </div>`;
}

function updateBadge() {
    const badge = document.getElementById('kolBadge');
    const upcoming = allKols.filter(k => k.dateMs >= Date.now()).length;
    if (upcoming > 0) {
        badge.style.display = 'flex';
        badge.textContent = upcoming;
    } else {
        badge.style.display = 'none';
    }
}

// ── FORM ──
let selectedType = 'kol';

function selectKolType(type) {
    selectedType = type;
    ['kol','wej','egz'].forEach(t => {
        document.getElementById('type'+t.charAt(0).toUpperCase()+t.slice(1)).className =
            'kol-type-opt' + (t === type ? ` sel-${t}` : '');
    });
}
window.selectKolType = selectKolType;

function openKolModal() {
    // Set today as default date
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const dd = String(today.getDate()).padStart(2,'0');
    document.getElementById('kolDate').value = `${yyyy}-${mm}-${dd}`;
    document.getElementById('kolTime').value = '';
    document.getElementById('kolSubject').value = '';
    document.getElementById('kolRoom').value = '';
    document.getElementById('kolNotes').value = '';
    selectedType = 'kol';
    selectKolType('kol');
    document.getElementById('kolModalOverlay').classList.add('open');
}
window.openKolModal = openKolModal;

function closeKolModal() {
    document.getElementById('kolModalOverlay').classList.remove('open');
}
window.closeKolModal = closeKolModal;

async function submitKol() {
    const subject = document.getElementById('kolSubject').value.trim();
    const date    = document.getElementById('kolDate').value;
    const time    = document.getElementById('kolTime').value;
    const room    = document.getElementById('kolRoom').value.trim();
    const notes   = document.getElementById('kolNotes').value.trim();

    if (!subject || !date) {
        alert('Podaj przedmiot i datę!');
        return;
    }

    const btn = document.getElementById('kolSubmitBtn');
    btn.disabled = true; btn.textContent = 'Zapisywanie…';

    try {
        // dateMs is date+time combined for sorting
        const [y,m,d] = date.split('-').map(Number);
        let dateMs;
        if (time) {
            const [hh,min] = time.split(':').map(Number);
            dateMs = new Date(y, m-1, d, hh, min).getTime();
        } else {
            dateMs = new Date(y, m-1, d, 23, 59).getTime();
        }

        await addDoc(kolCollection, {
            type: selectedType,
            subject,
            date,
            time,
            room,
            notes,
            dateMs,
            addedAt: Date.now()
        });

        closeKolModal();
    } catch(e) {
        alert('Błąd zapisu: ' + e.message);
    } finally {
        btn.disabled = false; btn.textContent = 'Dodaj do kalendarza';
    }
}
window.submitKol = submitKol;

async function deleteKol(id) {
    if (!confirm('Usunąć ten wpis?')) return;
    try {
        await deleteDoc(doc(db, 'kolokwia', id));
    } catch(e) {
        alert('Błąd usuwania: ' + e.message);
    }
}
window.deleteKol = deleteKol;

// ── DETAIL MODAL ──
let detailKol = null;

function openDetailModal(k) {
    // k may come from JSON.parse via onclick attr
    if (typeof k === 'string') k = JSON.parse(k);
    detailKol = k;
    const d = new Date(k.dateMs);
    const months = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
    const dateStr = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    const color = kolColor(k.type);
    const label = kolLabel(k.type);

    document.getElementById('kolDetailContent').innerHTML = `
        <span class="kol-type-badge kol-type-${k.type}">${label}</span>
        <div class="kol-detail-subject">${k.subject}</div>
        <div class="kol-detail-row">📅 <strong>${dateStr}</strong></div>
        ${k.time ? `<div class="kol-detail-row">🕐 Godzina: <strong>${k.time}</strong></div>` : ''}
        ${k.room ? `<div class="kol-detail-row">📍 Sala: <strong>${k.room}</strong></div>` : ''}
        ${k.notes ? `<div class="kol-detail-row" style="flex-direction:column;align-items:flex-start;gap:4px">
            📋 <strong>Notatki:</strong>
            <div class="kol-detail-notes">${k.notes.replace(/\n/g,'<br>')}</div>
        </div>` : ''}
    `;

    document.getElementById('kolDetailDelete').onclick = () => {
        closeDetailModal();
        deleteKol(k.id);
    };

    document.getElementById('kolDetailOverlay').classList.add('open');
}
window.openDetailModal = openDetailModal;

function closeDetailModal() {
    document.getElementById('kolDetailOverlay').classList.remove('open');
}
window.closeDetailModal = closeDetailModal;

// Hook into openPanel to refresh week cal
const _origOpenPanel = window.openPanel;
window.openPanel = function(id) {
    _origOpenPanel(id);
    if (id === 'kolOverlay') { renderWeekCal(); }
};

</script>
</body>
</html>
